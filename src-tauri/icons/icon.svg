<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g transform="translate(256,256)">

    <!-- Markdown M constructed from heading bars -->
    <g stroke="#fff" stroke-linecap="round" fill="none">
      <!-- Left spine of M -->
      <line x1="-110" y1="-120" x2="-110" y2="100" stroke-width="28"/>

      <!-- Right side: horizontal bars at header levels -->
      <line x1="20" y1="-120" x2="110" y2="-120" stroke-width="20"/>
      <line x1="20" y1="-60" x2="110" y2="-60" stroke-width="18"/>
      <line x1="20" y1="0" x2="110" y2="0" stroke-width="16"/>
      <line x1="20" y1="60" x2="110" y2="60" stroke-width="14"/>

      <!-- Connecting V from left top to right bars midpoint -->
      <polyline points="-110,-120 0,-60 20,-120" stroke-width="20"/>
    </g>

    <!-- Markdown # symbol at top -->
    <g transform="translate(-130,-160)" fill="#fff" opacity="0.4">
      <rect x="0" y="0" width="36" height="10" rx="3"/>
      <rect x="0" y="18" width="36" height="10" rx="3"/>
      <rect x="16" y="-8" width="10" height="36" rx="3"/>
      <rect x="0" y="0" width="16" height="10" rx="3"/>
    </g>

    <!-- Markdown list bullet -->
    <g transform="translate(-130,120)" fill="#fff" opacity="0.3">
      <circle cx="0" cy="0" r="8"/>
      <rect x="20" y="-7" width="60" height="14" rx="4"/>
      <circle cx="0" cy="28" r="8"/>
      <rect x="20" y="21" width="40" height="14" rx="4"/>
    </g>
  </g>
</svg>
